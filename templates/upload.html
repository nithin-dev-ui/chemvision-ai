<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChemVision AI Upload Analyzer</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">

<style>

.upload-card{
    background:rgba(255,255,255,.05);
    border:2px dashed rgba(0,229,255,.4);
    border-radius:25px;
    padding:50px;
    text-align:center;
}

.preview-card,
.analysis-card{
    margin-top:25px;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.08);
    border-radius:20px;
    padding:25px;
}

.preview-box{
    margin-top:15px;
    min-height:300px;
    display:flex;
    justify-content:center;
    align-items:center;
    border-radius:15px;
    background:rgba(255,255,255,.03);
    overflow:hidden;
}

.preview-box img{
    max-width:100%;
    max-height:300px;
    border-radius:10px;
}

.analysis-result{
    margin-top:15px;
    line-height:1.9;
    color:#b7c0d1;
}

.hidden-input{
    display:none;
}

</style>

</head>

<body>

<h1 class="page-title">
📷 ChemVision AI Upload Analyzer
</h1>

<div class="container">

```
<div class="upload-card">

    <h2>Upload Chemistry Image</h2>

    <br>

    <form method="POST" enctype="multipart/form-data">

    <input
        type="file"
        name="image"
        accept="image/*"
        required
    >

    <br><br>

    <button class="ai-btn" type="submit">
        Upload & Analyze
    </button>

</form>

</div>

<div class="preview-card">

    <h2>Image Preview</h2>

    <div class="preview-box">

{% if image_path %}

<img src="{{ image_path }}">

{% else %}

No image uploaded

{% endif %}

</div>

</div>

<div class="analysis-card">

    <h2>AI Analysis</h2>

    <div class="analysis-result">

{% if analysis %}

{{ analysis }}

{% else %}

Upload an image to begin analysis.

{% endif %}

</div>

</div>

<a href="/dashboard" class="back-link">
    ← Back to Dashboard
</a>
```

</div>

</body>
</html>
