<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChemVision AI Safety Checker</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">

<style>

.info-card{
    margin-top:25px;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.08);
    border-radius:20px;
    padding:25px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-top:20px;
}

.item{
    background:rgba(255,255,255,.04);
    border-radius:15px;
    padding:20px;
}

.value{
    margin-top:10px;
    font-weight:bold;
    color:#00e5ff;
}

</style>
</head>

<body>

<h1 class="page-title">
☣ ChemVision AI Safety Checker
</h1>

<div class="container">

    <div class="glass-card">

        <h2>Enter Chemical Name</h2>

        <form method="POST">

            <input
                class="input-box"
                type="text"
                name="chemical"
                placeholder="Example: HCl"
                required
            >

            <button class="ai-btn" type="submit">
                Analyze Safety
            </button>

        </form>

    </div>

    {% if hazard %}

    <div class="info-card">

        <h2>Safety Analysis</h2>

        <div style="white-space: pre-wrap; line-height:1.8;">
    {{ hazard }}
</div>

    </div>

    <div class="info-card">

        <h2>AI Recommendation</h2>

        <br>

        {{ recommendation }}

    </div>

    {% endif %}

    <a href="/dashboard" class="back-link">
        ← Back to Dashboard
    </a>

</div>

</body>
</html>
